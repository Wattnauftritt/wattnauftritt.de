<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 200" role="img" aria-label="Watt'n Auftritt">
  <defs>
    <linearGradient id="waSky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e76a52"/>
      <stop offset="50%" stop-color="#f4a98e"/>
      <stop offset="50%" stop-color="#2ba89b"/>
      <stop offset="100%" stop-color="#147066"/>
    </linearGradient>
  </defs>

  <!-- Emblem: Kugelbake im Sonnenuntergang -->
  <g transform="translate(0,0)">
    <rect x="4" y="4" width="172" height="172" rx="34" fill="url(#waSky)"/>
    <circle cx="56" cy="62" r="15" fill="#fff" opacity=".82"/>
    <g stroke="#15201f" stroke-width="5.6" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <line x1="46" y1="132" x2="130" y2="132"/>
      <line x1="88" y1="54" x2="50" y2="132"/>
      <line x1="88" y1="54" x2="126" y2="132"/>
      <line x1="88" y1="54" x2="73" y2="132"/>
      <line x1="88" y1="54" x2="103" y2="132"/>
      <line x1="62" y1="107" x2="114" y2="107"/>
      <line x1="69" y1="84" x2="107" y2="84"/>
      <line x1="88" y1="34" x2="88" y2="54"/>
      <line x1="88" y1="17" x2="88" y2="24"/>
    </g>
    <circle cx="88" cy="28" r="6.6" fill="#15201f"/>
    <rect x="4" y="4" width="172" height="172" rx="34" fill="none" stroke="#15201f" stroke-width="8"/>
  </g>

  <!-- Wortmarke -->
  <text x="200" y="92" font-family="Sora, 'Segoe UI', sans-serif" font-weight="800" font-size="46" letter-spacing="1.5" fill="#15201f">WATT'N</text>
  <text x="200" y="146" font-family="Sora, 'Segoe UI', sans-serif" font-weight="800" font-size="46" letter-spacing="1.5" fill="#c8412f">AUFTRITT</text>
</svg>
